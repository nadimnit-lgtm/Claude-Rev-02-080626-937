name: Build Dua & Zikr APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Validate and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (pre-install 8.9, cache, no wrapper download)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate required files
        run: |
          set -e
          required=(
            settings.gradle build.gradle gradle.properties
            gradlew gradlew.bat
            gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
            app/build.gradle app/src/main/AndroidManifest.xml
            app/src/main/java/com/ahmed/azkartv/MainActivity.kt
            app/src/main/assets/index.html app/src/main/assets/app.css app/src/main/assets/app.js
            app/src/main/assets/fonts/NotoNastaliqUrdu-Regular.ttf
            app/src/main/assets/content/content.json app/src/main/assets/content/sections.json
            app/src/main/res/drawable-xhdpi/tv_banner.png
            tools/validate.py tools/test_logic.py
            .github/workflows/build-apk.yml
          )
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then echo "::error::missing required file $f"; exit 1; fi
          done
          echo "All required files present."

      - name: Validate JSON syntax
        run: |
          python3 -c "import json,glob,sys
          bad=0
          for f in glob.glob('app/src/main/assets/content/*.json'):
              try: json.load(open(f,encoding='utf-8'))
              except Exception as e:
                  print(f'::error::invalid JSON {f}: {e}'); bad=1
          sys.exit(bad)"

      - name: Check for duplicate Arabic content and run full validation
        run: python3 tools/validate.py

      - name: Run logic tests (repeat parsing, mixed flow, settings, contract)
        run: python3 tools/test_logic.py

      - name: Build debug APK (uses pre-installed Gradle, bypasses wrapper download)
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dua-and-zikr-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  smoke:
    name: DOM runtime smoke test (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsdom
        run: npm install jsdom@24 --no-audit --no-fund
      - name: Run DOM smoke test
        run: node tools/dom_smoke.mjs
